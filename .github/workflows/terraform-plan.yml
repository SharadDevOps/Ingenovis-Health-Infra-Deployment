name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - 'deployment/projects/**'

permissions:
  contents: read
  pull-requests: write
  id-token: write             # OIDC auth to Azure

jobs:
  detect-changes:
    name: Detect Changed Environments
    runs-on: ubuntu-latest
    outputs:
      folders: ${{ steps.changed.outputs.folders }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed Terraform folders
        id: changed
        run: |
          FOLDERS=$(git diff --name-only origin/main...HEAD \
            | grep '^deployment/projects/' \
            | grep '\.tf$' \
            | xargs -I{} dirname {} \
            | sort -u \
            | jq -R -s -c 'split("\n")[:-1]')
          echo "folders=$FOLDERS" >> $GITHUB_OUTPUT
          echo "Changed folders: $FOLDERS"

  terraform-plan:
    name: Plan
    needs: detect-changes
    if: needs.detect-changes.outputs.folders != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folder: ${{ fromJson(needs.detect-changes.outputs.folders) }}
      fail-fast: false          # plan all folders even if one fails

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ matrix.folder }}

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        working-directory: ${{ matrix.folder }}

      - name: Post Plan to PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const output = `### Terraform Plan: \`${{ matrix.folder }}\`
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })