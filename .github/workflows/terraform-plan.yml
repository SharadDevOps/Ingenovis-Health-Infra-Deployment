name: Terraform Plan

"on":
  pull_request:
    branches: [main]
    paths:
      - 'deployment/projects/**' #path of projects

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  detect-changes:
    name: Detect Changed Folders
    runs-on: ubuntu-latest
    outputs:
      folders: ${{ steps.changed.outputs.folders }}
      has_changes: ${{ steps.changed.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed Terraform folders
        id: changed
        run: |
          FOLDERS=$(git diff --name-only origin/main...HEAD \
            | grep '^deployment/projects/' \
            | grep -E '\.(tf|tfvars)$' \
            | xargs -I{} dirname {} \
            | sort -u \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "folders=$FOLDERS" >> $GITHUB_OUTPUT

          if [ "$FOLDERS" = "[]" ] || [ -z "$FOLDERS" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

          echo "Changed folders: $FOLDERS"

  terraform-plan:
    name: Plan / ${{ matrix.folder }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folder: ${{ fromJson(needs.detect-changes.outputs.folders) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        id: init
        run: terraform init -input=false
        working-directory: ${{ matrix.folder }}

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan_output.txt
        working-directory: ${{ matrix.folder }}
        continue-on-error: true

      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('${{ matrix.folder }}/plan_output.txt', 'utf8');
            const maxLength = 60000;
            const truncated = planOutput.length > maxLength
              ? planOutput.substring(0, maxLength) + '\n... (truncated)'
              : planOutput;

            const status = '${{ steps.plan.outcome }}' === 'success' ? 'Plan succeeded' : 'Plan failed';

            const body = `### Terraform Plan: \`${{ matrix.folder }}\` — ${status}
            <details><summary>Show Plan Output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1