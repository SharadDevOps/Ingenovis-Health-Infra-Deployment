name: Terraform Apply

"on":
  workflow_dispatch:
    inputs:
      target:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - platform/hub
          - platform/shared-services
          - ai-matching-1/dev
          - ai-matching-1/qa
          - ai-matching-1/preprod
          - ai-matching-1/prod
          - ai-matching-2/dev
          - ai-matching-2/qa
          - ai-matching-2/preprod
          - ai-matching-2/prod
          - analytics/dev
          - analytics/qa
          - analytics/preprod
          - analytics/prod
          - billing/dev
          - billing/qa
          - billing/preprod
          - billing/prod
      confirm:
        description: 'Type DEPLOY to confirm'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  validate-input:
    name: Validate Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "DEPLOY" ]; then
            echo "Confirmation failed — you must type DEPLOY exactly"
            exit 1
          fi

  plan:
    name: Plan / ${{ inputs.target }}
    needs: validate-input
    runs-on: ubuntu-latest
    outputs:
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: deployment/projects/${{ inputs.target }}

      - name: Terraform Plan
        id: plan
        run: |
          set -o pipefail
          terraform plan -no-color -input=false -detailed-exitcode -out=tfplan 2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        working-directory: deployment/projects/${{ inputs.target }}

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: deployment/projects/${{ inputs.target }}/tfplan
          retention-days: 1

  apply:
    name: Apply / ${{ inputs.target }}
    needs: plan
    runs-on: ubuntu-latest
    # Maps any target to one of 3 GitHub environments
    # platform/hub        → dev
    # ai-matching-1/dev   → dev
    # ai-matching-1/preprod → preprod
    # ai-matching-1/prod  → prod
    environment: >-
      ${{
        contains(inputs.target, '/prod') && 'prod' ||
        contains(inputs.target, 'preprod') && 'preprod' ||
        'dev'
      }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: deployment/projects/${{ inputs.target }}

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: deployment/projects/${{ inputs.target }}

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false tfplan
        working-directory: deployment/projects/${{ inputs.target }}